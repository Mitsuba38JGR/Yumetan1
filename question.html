<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  body { font-family: sans-serif; }
  .q { margin-bottom: 10px; }
  input { margin-left: 10px; }
</style>
</head>
<body><h2>テスト</h2>
<div id="paper"></div><br>
<button onclick="checkAnswers()">採点</button>
<button onclick="downloadJPEG()">JPEG保存</button><p id="score"></p><script>
const params = new URLSearchParams(location.search);
const start = parseInt(params.get("start"));
const end = parseInt(params.get("end"));
const mode = params.get("mode");

// シャッフル
function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// 正規化（ひらがな・カタカナ・小文字）
function normalize(str){
  return str
    .toLowerCase()
    .replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60)) // カタカナ→ひらがな
    .replace(/\s+/g, ""); // 空白削除
}

fetch("words.json")
.then(res => res.json())
.then(words => {

  let filtered = words.filter(w => {
    return w.id >= start && w.id <= end && w.en && w.ja;
  });

  if(filtered.length === 0){
    document.getElementById("paper").textContent = "問題が見つかりません";
    return;
  }

  shuffle(filtered);
  const selected = filtered.slice(0, 50);
  selected.sort((a, b) => a.id - b.id);
  const paper = document.getElementById("paper");

  selected.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "q";

    const question = (mode === "enToJa") ? w.en : w.ja;
    const answer = (mode === "enToJa") ? w.ja : w.en;

    div.innerHTML = `
      <span>${i+1}. ${question}</span>
      <input type="text" id="ans${i}" data-answer="${answer}">
      <span id="result${i}"></span>
    `;

    paper.appendChild(div);

    // Enterで次へ
    const input = div.querySelector("input");
    input.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        const next = document.getElementById("ans" + (i+1));
        if(next) next.focus();
      }
    });
  });

});

// 採点
function checkAnswers(){
  let correct = 0;
  let partial = 0;
  const inputs = document.querySelectorAll("input[type='text']");

  inputs.forEach((input, i) => {
    const answerRaw = input.dataset.answer;
    const userRaw = input.value;

    const answer = normalize(answerRaw);
    const user = normalize(userRaw);

    const result = document.getElementById("result" + i);

    if(user === ""){
      result.textContent = " 未入力";
      result.style.color = "gray";
      return;
    }

    if(user === answer){
      result.textContent = " ○";
      result.style.color = "green";
      correct++;
    }
    else if(answer.includes(user) || user.includes(answer)){
      result.textContent = " △ (" + answerRaw + ")";
      result.style.color = "orange";
      partial++;
    }
    else{
      result.textContent = " × (" + answerRaw + ")";
      result.style.color = "red";
    }
  });

  document.getElementById("score").textContent =
    `正解: ${correct} / ${inputs.length}　部分一致: ${partial}`;
}

// JPEG保存
function downloadJPEG(){
  html2canvas(document.getElementById("paper")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "test.jpg";
    link.href = canvas.toDataURL("image/jpeg");
    link.click();
  });
}
</script></body>
</html>

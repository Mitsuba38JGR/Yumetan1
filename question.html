<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body { font-family: sans-serif; }
#paper { width: 800px; margin: auto; padding: 20px; border: 1px solid black; }
.q { margin: 10px 0; }
input { font-size: 16px; padding: 4px; margin-top: 4px; }
@media print { button { display: none; } }
</style>
</head>
<body>

<h1 style="text-align:center;">問題</h1>
<div id="paper"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="checkAnswers()">答え合わせ</button>
  <button onclick="downloadJPEG()">JPEG保存</button>
  <button onclick="window.print()">印刷</button>
  <p id="score"></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const start = parseInt(params.get("start")) || 1;
const end = parseInt(params.get("end")) || 9999;
const mode = params.get("mode");

function normalize(str){
  return str.replace(/（.*?）/g, "").replace(/～/g, "").replace(/\s/g, "").trim().toLowerCase();
}

function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

fetch("words.json")
.then(res => {
  if(!res.ok) throw new Error("JSON読み込み失敗");
  return res.json();
})
.then(words => {

  let filtered = words.filter(w =>
    w.id >= start && w.id <= end && w.en && w.ja
  );

  if(filtered.length === 0){
    document.getElementById("paper").textContent = "問題が見つかりません";
    return;
  }

  shuffle(filtered);
  const selected = filtered.slice(0, Math.min(50, filtered.length));
  selected.sort((a, b) => a.id - b.id);

  const paper = document.getElementById("paper");

  selected.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "q";

    const question = (mode === "enToJa") ? w.en : w.ja;
    const answer = (mode === "enToJa") ? w.ja : w.en;

    div.innerHTML = `
      <div>${i+1}. ${question}</div>
      <input type="text" id="ans${i}" data-answer="${answer}" placeholder="答えを入力">
      <span id="result${i}"></span>
    `;

    paper.appendChild(div);

    const input = div.querySelector("input");
    input.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        const next = document.getElementById("ans" + (i+1));
        if(next) next.focus();
      }
    });
  });

});

function checkAnswers(){
  let correct = 0;
  const inputs = document.querySelectorAll("input[type='text']");

  inputs.forEach((input, i) => {
    const rawAnswer = input.dataset.answer;
    const user = input.value;
    const result = document.getElementById("result" + i);

    if(user.trim() === ""){
      result.textContent = " 未入力";
      result.style.color = "gray";
      return;
    }

    const answers = rawAnswer.split("|");
    const u = normalize(user);

    let isCorrect = answers.some(a => {
      const na = normalize(a);
      return na.includes(u) || u.includes(na);
    });

    if(isCorrect){
      result.textContent = " ○";
      result.style.color = "green";
      correct++;
    }else{
      result.textContent = " × (" + rawAnswer + ")";
      result.style.color = "red";
    }
  });

  document.getElementById("score").textContent =
    `正解数: ${correct} / ${inputs.length}`;
}

function downloadJPEG(){
  html2canvas(document.getElementById("paper")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "test.jpg";
    link.href = canvas.toDataURL("image/jpeg");
    link.click();
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { font-family: sans-serif; }
#paper {
  width: 800px;
  margin: auto;
  padding: 20px;
  border: 1px solid black;
}
.q { margin: 10px 0; }

input {
  font-size: 16px;
  padding: 4px;
  margin-top: 4px;
}

@media print {
  button { display: none; }
}
</style>
</head>
<body>

<h1 style="text-align:center;">問題</h1>

<div id="paper"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="checkAnswers()">答え合わせ</button>
  <button onclick="downloadJPEG()">JPEG保存</button>
  <button onclick="window.print()">印刷</button>
  <p id="score"></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const start = parseInt(params.get("start"));
const end = parseInt(params.get("end"));
const mode = params.get("mode");

// シャッフル
function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

fetch("words.json")
.then(res => res.json())
.then(words => {

  let filtered = words.filter(w => {
    return w.id >= start && w.id <= end && w.en && w.ja;
  });

  if(filtered.length === 0){
    document.getElementById("paper").textContent = "問題が見つかりません";
    return;
  }

  shuffle(filtered);
  let selected = filtered.slice(0, 50);
    selected.sort((a, b) => a.id - b.id);
  const paper = document.getElementById("paper");

  selected.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "q";

    const question = (mode === "enToJa") ? w.en : w.ja;
    const answer = (mode === "enToJa") ? w.ja : w.en;

    div.innerHTML = `
      <div>${i+1}. ${question}</div>
      <input type="text" id="ans${i}" data-answer="${answer}" placeholder="答えを入力">
      <span id="result${i}"></span>
    `;

    paper.appendChild(div);

    // Enterで次へ
    const input = div.querySelector("input");
    input.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        const next = document.getElementById("ans" + (i+1));
        if(next) next.focus();
      }
    });
  });

});

// 判定
function checkAnswers(){
  let correct = 0;
  const inputs = document.querySelectorAll("input[type='text']");

  inputs.forEach((input, i) => {
    const answer = input.dataset.answer.trim();
    const user = input.value.trim();
    const result = document.getElementById("result" + i);

    if(user === ""){
      result.textContent = " 未入力";
      result.style.color = "gray";
      return;
    }

    if(user.toLowerCase() === answer.toLowerCase()){
      result.textContent = " ○";
      result.style.color = "green";
      correct++;
    }else{
      result.textContent = " × (" + answer + ")";
      result.style.color = "red";
    }
  });

  document.getElementById("score").textContent =
    `正解数: ${correct} / ${inputs.length}`;
}

// JPEG
function downloadJPEG(){
  html2canvas(document.getElementById("paper")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "test.jpg";
    link.href = canvas.toDataURL("image/jpeg");
    link.click();
  });
}
</script>

</body>
</html>
